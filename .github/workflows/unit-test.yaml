name: test-job

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Date Setup (MM/DD/YYYY)
        id: date
        run: echo "today=$(date +'%m/%d/%Y')" >> "$GITHUB_OUTPUT"

      # 1) Install pnpm before setup-node cache
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      # 2) Setup Node.js with pnpm cache
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # 3) Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 4) Run Unit Tests (Vitest)
      - name: Run Unit Tests (Vitest)
        run: pnpm run test