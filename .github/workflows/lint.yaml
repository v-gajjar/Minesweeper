name: lint-job

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Date Setup (MM/DD/YYYY)
        id: date
        run: echo "today=$(date +'%m/%d/%Y')" >> "$GITHUB_OUTPUT"

      - name: Runtime-Enviornment(Node js 20)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src --ext .js,.jsx,.ts,.tsx --cache --quiet || true

      - name: Run Prettier (warn-only)
        run: |
          if ! npx prettier --list-different . > /tmp/prettier_diff.txt; then
            echo "## Prettier Differences" >> $GITHUB_STEP_SUMMARY
            cat /tmp/prettier_diff.txt >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: true

      - name: Stylelint Summary Output
        run: |
          echo "## Stylelint Results" >> $GITHUB_STEP_SUMMARY
          npx stylelint "**/*.{css,scss}" >> $GITHUB_STEP_SUMMARY || true
