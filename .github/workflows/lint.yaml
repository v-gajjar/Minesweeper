name: lint-job

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Date Setup (MM/DD/YYYY)
        id: date
        run: echo "today=$(date +'%m/%d/%Y')" >> "$GITHUB_OUTPUT"

      # 1) Install pnpm before setup-node cache
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      # 2) Setup Node.js with pnpm cache
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # 3) Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 4) Run ESLint (warn-only)
      - name: Run ESLint
        run: pnpm exec eslint src --ext .js,.jsx,.ts,.tsx --cache --quiet || true

      # 5) Run Prettier (warn-only, summary)
      - name: Run Prettier (warn-only)
        run: |
          if ! pnpm exec prettier --list-different . > /tmp/prettier_diff.txt; then
            echo "## Prettier Differences" >> $GITHUB_STEP_SUMMARY
            cat /tmp/prettier_diff.txt >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: true

      # 6) Stylelint summary output
      - name: Stylelint Summary Output
        run: |
          echo "## Stylelint Results" >> $GITHUB_STEP_SUMMARY
          pnpm exec stylelint "**/*.{css,scss}" >> $GITHUB_STEP_SUMMARY || true