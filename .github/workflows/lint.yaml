name: lint-job

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node (20)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm eslint src --ext .js,.jsx,.ts,.tsx --cache --quiet || true

      - name: Run Prettier (warn-only)
        run: |
          if ! pnpm prettier --list-different . > /tmp/prettier_diff.txt; then
            echo "## Prettier Differences" >> $GITHUB_STEP_SUMMARY
            cat /tmp/prettier_diff.txt >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: true

      - name: Stylelint Summary Output
        run: |
          echo "## Stylelint Results" >> $GITHUB_STEP_SUMMARY
          pnpm stylelint "**/*.{css,scss}" >> $GITHUB_STEP_SUMMARY || true