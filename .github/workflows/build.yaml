name: build-job

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Date Setup (MM/DD/YYYY)
        id: date
        run: echo "today=$(date +'%m/%d/%Y')" >> "$GITHUB_OUTPUT"

      # 1) Setup Node and enable pnpm caching
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # 2) Enable pnpm via Corepack (Node 20 image has this)
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.0.0 --activate
          pnpm --version

      # 3) Install deps (cached via setup-node's pnpm cache)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 4) Build
      - name: Build App (Vite)
        run: pnpm run build