name: build-job

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Date Setup (MM/DD/YYYY)
        id: date
        run: echo "today=$(date +'%m/%d/%Y')" >> "$GITHUB_OUTPUT"

      # 1) Setup pnpm first (per pnpm docs)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # 2) Then setup Node + pnpm cache
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # 3) Now pnpm is guaranteed to be on PATH
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build App (Vite)
        run: pnpm run build