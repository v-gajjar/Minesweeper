name: Enhancement or Refactor
description: Improve existing functionality or refactor existing code.
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        ## Description
        Explain what should be improved or cleaned up.

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: What area or behavior needs improvement?
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Scope / Affected Area
        Specify which components, files, or modules are impacted.

  - type: textarea
    id: scope
    attributes:
      label: Scope / Affected Area
      placeholder: Components, files, or modules affected.

  - type: markdown
    attributes:
      value: |
        ## Proposed Approach
        Outline your plan, including risks or alternatives.

  - type: textarea
    id: approach
    attributes:
      label: Proposed Approach
      placeholder: High-level steps or refactor plan.

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Logs
      placeholder: Optional visual references or output.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      placeholder: Any relevant information or related discussions.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: This: IMPORTANT!! Before you make any changes, please sync your remote branch of develop with the develop branch for the main repository (if using a fork), and then check-out develop locally and pull these changes. Then create a branch off this. This is part of the Git Flow branching strategy we're using and gives us a safety net in-case anything badly goes wrong - it reduces the chances of corrupted/broken code being merged into the main branch.
          required: true
        - label: This issue includes enough detail to act on
