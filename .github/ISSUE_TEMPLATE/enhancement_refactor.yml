name: Enhancement or Refactor
description: Improve existing functionality or refactor existing code.
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        ## Description
        Explain what should be improved or cleaned up.

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: What area or behavior needs improvement?
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Scope / Affected Area
        Specify which components, files, or modules are impacted.

  - type: textarea
    id: scope
    attributes:
      label: Scope / Affected Area
      placeholder: Components, files, or modules affected.

  - type: markdown
    attributes:
      value: |
        ## Proposed Approach
        Outline your plan, including risks or alternatives.

  - type: textarea
    id: approach
    attributes:
      label: Proposed Approach
      placeholder: High-level steps or refactor plan.

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Logs
      placeholder: Optional visual references or output.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      placeholder: Any relevant information or related discussions.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: >-
            **Important:** Before making any changes:<br><br>
            1. Sync your remote `develop` branch with the main repository's `develop` branch (if using a fork).<br>
            2. Check out `develop` locally and pull the latest changes.<br>
            3. Create a new branch from `develop`.<br><br>
            Following this Git Flow process helps prevent corrupted or broken code from being merged into the main branch.
          required: true
        - label: This issue includes enough detail to act on
          required: true
