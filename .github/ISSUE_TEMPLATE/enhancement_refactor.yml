name: Enhancement / Refactor
description: Improve existing behavior or code health.
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should be improved or cleaned up?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope / Affected Area
      placeholder: Components, files, or modules impacted.
  - type: textarea
    id: approach
    attributes:
      label: Proposed Approach
      placeholder: High-level plan, risks, or alternatives.
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs (optional)
  - type: textarea
    id: context
    attributes:
      label: Additional Context
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: This: IMPORTANT!! Before you make any changes, please sync your remote branch of develop with the develop branch for the main repository (if using a fork), and then check-out develop locally and pull these changes. Then create a branch off this. This is part of the Git Flow branching strategy we're using and gives us a safety net in-case anything badly goes wrong - it reduces the chances of corrupted/broken code being merged into the main branch.
          required: true
        - label: This issue includes enough detail to act on