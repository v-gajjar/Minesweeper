name: Feature Request
description: Suggest a new feature or improvement.
labels: [feature]

body:
  - type: markdown
    attributes:
      value: |
        ## Description
        Explain what problem this feature would solve.

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: A clear summary of the idea or problem.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Proposed Solution
        Describe how this could work, including any UI/UX or API considerations.

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      placeholder: Outline the proposed approach or implementation details.

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Mockups
      placeholder: Optional visual examples.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      placeholder: Related issues, tradeoffs, or relevant links.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: This: IMPORTANT!! Before you make any changes, please sync your remote branch of develop with the develop branch for the main repository (if using a fork), and then check-out develop locally and pull these changes. Then create a branch off this. This is part of the Git Flow branching strategy we're using and gives us a safety net in-case anything badly goes wrong - it reduces the chances of corrupted/broken code being merged into the main branch.
          required: true
        - label: This issue includes enough detail to act on
