name: Feature Request
description: Suggest a new feature or improvement.
labels: [feature]

body:
  - type: markdown
    attributes:
      value: |
        ## Description
        Explain what problem this feature would solve.

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: A clear summary of the idea or problem.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Proposed Solution
        Describe how this could work, including any UI/UX or API considerations.

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      placeholder: Outline the proposed approach or implementation details.

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Mockups
      placeholder: Optional visual examples.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      placeholder: Related issues, tradeoffs, or relevant links.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: >-
            **Important:** Before making any changes:<br><br>
            1. Sync your remote `develop` branch with the main repository's `develop` branch (if using a fork).<br>
            2. Check out `develop` locally and pull the latest changes.<br>
            3. Create a new branch from `develop`.<br><br>
            Following this Git Flow process helps prevent corrupted or broken code from being merged into the main branch.
          required: true
        - label: This issue includes enough detail to act on
