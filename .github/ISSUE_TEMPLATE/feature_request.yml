name: Feature Request
description: Suggest a new capability or improvement.
labels: [feature]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What problem will this feature solve?
      placeholder: A clear, concise summary of the idea.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      placeholder: How would this work? Any rough UI/UX or API?
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Mockups (optional)
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      placeholder: Related issues/PRs, links, tradeoffs.
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: This: IMPORTANT!! Before you make any changes, please sync your remote branch of develop with the develop branch for the main repository (if using a fork), and then check-out develop locally and pull these changes. Then create a branch off this. This is part of the Git Flow branching strategy we're using and gives us a safety net in-case anything badly goes wrong - it reduces the chances of corrupted/broken code being merged into the main branch.
          required: true
        - label: This issue includes enough detail to act on