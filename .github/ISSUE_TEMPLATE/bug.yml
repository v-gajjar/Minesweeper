name: Bug Report
description: Report something that is broken or not working as expected.
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        ## Description
        Provide a clear, concise summary of the bug.

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: What’s wrong? When did you notice it?
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Steps to Reproduce
        List the steps needed to reproduce the issue.

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Step one
        2. Step two
        3. …
    validations:
      required: true

  - type: input
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen?

  - type: input
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What happens instead?

  - type: markdown
    attributes:
      value: |
        ## Environment
        Fill in what applies.

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        | Info        | Details                  |
        | ----------- | ------------------------ |
        | OS          | macOS 14.6 / Windows 11  |
        | Browser     | Chrome 127 / Firefox 122 |
        | Device      | Desktop / iPhone 15      |
        | App Version | v1.2.3 or commit SHA     |

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      placeholder: Any extra information, links, or related issues.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: >-
            **Important:**  
            Before making any changes:  
            1. Sync your remote `develop` branch with the main repository's `develop` branch (if using a fork).  
            2. Check out `develop` locally and pull the latest changes.  
            3. Create a new branch from `develop`.  

            Following this Git Flow process helps prevent corrupted or broken code from being merged into the main branch.
          required: true
        - label: This issue is reproducible
        - label: This issue includes enough detail to act on
